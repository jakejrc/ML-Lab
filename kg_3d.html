s", "target": "silhouette", "relation": "包含", "color": "#64748B"}, {"source": "eval_metrics", "target": "elbow_method", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "cross_validation", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "grid_search", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "regularization", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "learning_curve", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "bias_variance", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "ensemble", "relation": "包含", "color": "#64748B"}, {"source": "model_optimization", "target": "feature_importance", "relation": "包含", "color": "#64748B"}];
const colorMap = {"基础": "#4F46E5", "数据": "#10B981", "预处理": "#059669", "特征工程": "#8B5CF6", "监督学习": "#F59E0B", "无监督学习": "#EF4444", "评估": "#EC4899", "模型优化": "#06B6D4", "深度学习": "#F97316", "部署": "#6366F1"};

const Graph = ForceGraph3D()(document.getElementById('graph'))
  .graphData({ nodes: nodesData, links: linksData })
  .backgroundColor('#ffffff')
  .nodeVal('val')
  .nodeColor('color')
  .nodeResolution(16)
  .nodeOpacity(0.9)
  .nodeThreeObject(node => {
    const size = Math.max(4, node.val * 0.35);
    const sprite = new SpriteText(node.label);
    sprite.color = '#1e293b';
    sprite.textHeight = Math.max(5, size * 1.15);
    sprite.backgroundColor = node.color + '66';
    sprite.padding = 3;
    sprite.borderRadius = 4;
    sprite.borderWidth = 0;
    sprite.fontWeight = 'bold';
    return sprite;
  })
  .nodeThreeObjectExtend(true)
  .linkColor('color')
  .linkWidth(0.6)
  .linkOpacity(0.3)
  .linkDirectionalParticles(1)
  .linkDirectionalParticleWidth(1.5)
  .linkDirectionalParticleSpeed(0.003)
  .linkDirectionalParticleColor(() => '#4F46E5')
  .onNodeHover(node => {
    document.body.style.cursor = node ? 'pointer' : 'default';
    const tooltip = document.getElementById('tooltip');
    if (node) {
      tooltip.style.display = 'block';
      tooltip.innerHTML = '<b style="font-size:15px;">' + node.label + '</b><br>' +
        '<span class="cat" style="color:' + node.color + ';">' + node.category + '</span>' +
        '<div class="desc">' + (node.description || '') + '</div>' +
        '<div style="margin-top:6px;font-size:11px;color:#64748b;">关联: ' + (node.val - 8) / 2 + ' 个概念</div>';
    } else {
      tooltip.style.display = 'none';
    }
  })
  .onNodeClick(node => {
    // 聚焦到点击的节点
    const distance = 80;
    const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node, 2000
    );
    // 高亮邻居
    const neighbors = new Set();
    linksData.forEach(l => {
      if (l.source.id === node.id) neighbors.add(l.target.id);
      if (l.target.id === node.id) neighbors.add(l.source.id);
    });
    Graph.nodeColor(n => n.id === node.id ? '#F59E0B' : (neighbors.has(n.id) ? n.color : 'rgba(100,100,120,0.3)'));
    Graph.linkWidth(l => (l.source.id === node.id || l.target.id === node.id) ? 2 : 0.3);
    Graph.linkOpacity(l => (l.source.id === node.id || l.target.id === node.id) ? 0.8 : 0.1);
    document.getElementById('highlighted').style.display = 'block';
    document.getElementById('highlighted').innerHTML = 
      '<b style="color:#F59E0B;">' + node.label + '</b> — ' + node.category + 
      '<br><span style="font-size:11px;">点击空白处重置</span>';
  })
  .onBackgroundClick(() => {
    Graph.nodeColor('color');
    Graph.linkWidth(0.6);
    Graph.linkOpacity(0.3);
    document.getElementById('highlighted').style.display = 'none';
  })
  .d3AlphaDecay(0.02)
  .d3VelocityDecay(0.3)
  .warmupTicks(50)
  .cooldownTicks(200);

// 鼠标跟踪显示tooltip
document.addEventListener('mousemove', (e) => {
  const tooltip = document.getElementById('tooltip');
  if (tooltip.style.display === 'block') {
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }
});

// 图例
const legendEl = document.getElementById('legend');
let legendHtml = '<div class="legend-title">概念类别</div>';
for (const [cat, color] of Object.entries(colorMap)) {
  const count = nodesData.filter(n => n.category === cat).length;
  if (count > 0) {
    legendHtml += '<div class="legend-item"><span class="legend-color" style="background:' + color + '"></span>' + cat + ' (' + count + ')</div>';
  }
}
legendEl.innerHTML = legendHtml;

// 统计
document.getElementById('stats').innerHTML = 
  '节点: <span>' + nodesData.length + '</span> · 关系: <span>' + linksData.length + '</span> · ' +
  '滚轮缩放 · 拖拽旋转 · 点击聚焦';

// 搜索
document.getElementById('searchInput').addEventListener('input', (e) => {
  const keyword = e.target.value.toLowerCase().trim();
  if (!keyword) {
    Graph.nodeColor('color');
    Graph.linkOpacity(0.3);
    return;
  }
  const matched = nodesData.filter(n => 
    n.label.toLowerCase().includes(keyword) || 
    n.category.toLowerCase().includes(keyword) ||
    n.description.toLowerCase().includes(keyword)
  );
  const matchedIds = new Set(matched.map(n => n.id));
  Graph.nodeColor(n => matchedIds.has(n.id) ? '#F59E0B' : 'rgba(200,200,200,0.3)');
  Graph.linkOpacity(l => (matchedIds.has(l.source.id) && matchedIds.has(l.target.id)) ? 0.5 : 0.05);
});

// 初始相机位置
Graph.cameraPosition({ x: 0, y: 0, z: 400 }, { x: 0, y: 0, z: 0 }, 0);
setTimeout(() => Graph.cameraPosition({ x: 200, y: 100, z: 300 }, { x: 0, y: 0, z: 0 }, 3000), 500);
</script>
